<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PES Lig</title>
  <link rel="stylesheet" href="style.css" />

<body>

  <header class="topbar">
    <div class="container topbar-inner">
      <div class="logo">PES LİGİ</div>
    </div>
  </header>

  <div class="container">
    <section class="hero">
      <h1 id="leagueTitle">PES Ligi</h1>
      <p>Canlı puan durumu, fikstür ve gol krallığı.</p>
    </section>

    <section class="section">
      <div class="grid grid-3">
        <div class="stat-box"><div class="stat-title">Toplam Takım</div><div class="stat-value" id="statPlayers">0</div></div>
        <div class="stat-box"><div class="stat-title">Oynanan Maç</div><div class="stat-value" id="statPlayed">0</div></div>
        <div class="stat-box"><div class="stat-title">Toplam Gol</div><div class="stat-value" id="statGoals">0</div></div>
      </div>
    </section>

    <section class="section card">
      <h2>Puan Durumu</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>#</th><th>Takım</th><th>O</th><th>G</th><th>B</th><th>M</th><th>AG</th><th>YG</th><th>AV</th><th>P</th></tr>
          </thead>
          <tbody id="standingsTable"></tbody>
        </table>
      </div>
    </section>

    <section class="grid grid-2 section">
      <div class="card"><h2>Fikstür</h2><div id="fixturesPublic" class="list"></div></div>
      <div class="card"><h2>Gol Krallığı</h2><div id="scorersTable" class="list"></div></div>
    </section>
  </div>

const myFixtures = [

    { id: "h24_m1", week: 24, home: "4", away: "1", homeScore: null, awayScore: null, played: false, homeScorers: [], awayScorers: [] },

    // --- DÜZENLEME BİTİŞ ---

    // Fonksiyonlar
    function getTeams() { return myTeams; }
    function getFixtures() { return myFixtures; }

    function renderStats() {
      const teams = getTeams();
      const fixtures = getFixtures();
      const played = fixtures.filter(f => f.played);
      document.getElementById("statPlayers").textContent = teams.length;
      document.getElementById("statPlayed").textContent = played.length;
      document.getElementById("statGoals").textContent = played.reduce((s, m) => s + (m.homeScore + m.awayScore), 0);
    }

    function renderStandings() {
      const table = getTeams().map(t => ({...t, played:0, win:0, draw:0, lose:0, gf:0, ga:0, pts:0}));
      getFixtures().filter(m => m.played).forEach(m => {
        const h = table.find(t => t.id == m.home);
        const a = table.find(t => t.id == m.away);
        h.played++; a.played++;
        h.gf += m.homeScore; h.ga += m.awayScore;
        a.gf += m.awayScore; a.ga += m.homeScore;
        if(m.homeScore > m.awayScore) { h.win++; h.pts += 3; }
        else if(m.homeScore < m.awayScore) { a.win++; a.pts += 3; }
        else { h.draw++; a.draw++; h.pts += 1; a.pts += 1; }
      });
      table.sort((a,b) => b.pts - a.pts);
      const tbody = document.getElementById("standingsTable");
      tbody.innerHTML = table.map((t, i) => `<tr><td>${i+1}</td><td>${t.name}</td><td>${t.played}</td><td>${t.win}</td><td>${t.draw}</td><td>${t.lose}</td><td>${t.gf}</td><td>${t.ga}</td><td>${t.gf-t.ga}</td><td><strong>${t.pts}</strong></td></tr>`).join("");
    }

    function renderFixtures() {
      const list = document.getElementById("fixturesPublic");
      list.innerHTML = getFixtures().map(m => {
        const h = getTeams().find(t => t.id == m.home);
        const a = getTeams().find(t => t.id == m.away);
        return `<div class="fixture-item"><strong>Hafta ${m.week}</strong><br>${h.name} vs ${a.name} <div class="fixture-score">${m.played ? m.homeScore +"-"+ m.awayScore : "Bekliyor"}</div></div>`;
      }).join("");
    }

    function renderScorers() {
      const scorers = {};
      getFixtures().forEach(m => {
        [...m.homeScorers, ...m.awayScorers].forEach(s => {
          scorers[s.name] = (scorers[s.name] || 0) + s.goals;
        });
      });
      document.getElementById("scorersTable").innerHTML = Object.entries(scorers)
        .sort((a,b) => b[1] - a[1])
        .map(([name, goals], i) => `<div class="scorer-item">${i+1}. ${name} - ${goals} Gol</div>`).join("");
    }

    renderStats(); renderStandings(); renderFixtures(); renderScorers();
  </script>
